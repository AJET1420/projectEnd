# ==================== Server ====================
server.port=8080

# ==================== Application ====================
app.version=1.0.0
app.environment=local

# ==================== Actuator (Health + Metrics) ====================
# Expose endpoints for Kubernetes probes and Prometheus scraping
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# Info endpoint
management.info.env.enabled=true
info.app.name=hello-service
info.app.version=${app.version}
info.app.environment=${app.environment}

# ==================== Metrics ====================
# Tag all metrics with application name (for Prometheus/Grafana filtering)
management.metrics.tags.application=hello-service
